{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login Page</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oxygen:wght@300;400;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                 --color-primary: hsl(211, 100%, 50%);
                --color-primary-hover: hsl(211, 100%, 45%);
                --color-text: #1a1a1a;
                --color-text-muted: #555;
                --color-border: #d8dadf;
                --color-border-focus: hsl(211, 100%, 50%);
                --radius: 10px;
                --font-sans: "Oxygen";
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                font-family: var(--font-sans);
                background-color: hsl(0, 0%, 98%);
                color: var(--color-text);
            }

            .top-bar {
                display: flex;
                align-items: center;
                gap: 4px;
            }

            .logo {
                font-family: var(--font-sans);
                color: black;
                font-size: 30px;
                font-weight: 700;
                letter-spacing: -0.02em;
            }

            .main {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }

            .login-card {
                width: 100%;
                max-width: 360px;
                background: #fff;
                box-shadow: rgba(0, 0, 0, 0.16) 0px 1px 4px;
                border-radius: var(--radius);
                display: flex;
                flex-direction: column;
            }
            .title-bar {
                margin-bottom: 18px;
            }
            .title {
                font-family: var(--font-sans);
                font-size: 22px;
                font-weight: 500;
            }

            .field-group {
                display: flex;
                flex-direction: column;
                margin-bottom: 18px;
            }

            label {
                font-size: 13px;
                font-weight: 500;
                color: var(--color-text-muted);
                margin-bottom: 6px;
            }

            input {
                font-family: var(--font-sans);
                font-size: 15px;
                border: 1px solid var(--color-border);
                border-radius: 8px;
                outline: none;
                transition:
                    border-color 0.15s ease,
                    box-shadow 0.15s ease;
            }

            input:focus {
                border-color: var(--color-border-focus);
                box-shadow: 0 0 0 3px hsla(211, 100%, 50%, 0.15);
            }

            button {
                margin-top: 10px;
                width: 100%;
                font-family: var(--font-sans);
                font-size: 15px;
                font-weight: 500;
                cursor: pointer;
                background-color: var(--color-primary);
                color: white;
                border: none;
                border-radius: 8px;
                transition: background-color 0.15s ease;
            }

            button:hover {
                background-color: var(--color-primary-hover);
            }

            button:active {
                transform: translateY(1px);
            }

            button:disabled {
                background-color: #b9d4f5;
                cursor: not-allowed;
            }
        </style>
    </head>
    <body>
        <div class="top-bar">
            <span class="logo">Scribe</span>
        </div>

        <div class="main">
            <div class="login-card">
                <form id="login-form" method="POST">
                    {% csrf_token %}
                    <div class="title-bar"><span class="title">Login</span></div>

                    <div class="field-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" autocomplete="username" required />
                    </div>

                    <div class="field-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" autocomplete="current-password" required />
                    </div>

                    <button type="submit">Login</button>
                </form>
            </div>
        </div>
    </body>
</html>
