<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Notes - Notes App</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                margin: 0;
                min-height: 100vh;
            }
            #app {
                display: flex;
                height: 100vh;
            }
            #sidebar {
                border-right: 1px solid hsl(0, 0%, 95%);
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            #sidebar-title {
                display: flex;
                font-family: Open Sans;
                align-items: center;
                justify-content: space-between;
                padding: 4px;
            }
            #add-notes-btn {
                cursor: pointer;
                background-color: hsl(0, 0%, 95%);
                border: none;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #add-notes-btn:hover {
                background-color: hsl(0, 0%, 92%);
            }
            span {
                font-family: Open Sans;
                font-weight: 500;
                font-size: 24px;
            }
            #notes-list {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            #note-item {
                background-color: hsl(0, 0%, 95%);
                border: none;
                cursor: pointer;
                padding: 6px;
                border-radius: 10px;
            }
            .note-header {
                display: flex;
                gap: 10px;
                margin-bottom: 10px;
                align-items: center;
                justify-content: space-between;
            }
            .note-title {
                font-family: Open Sans;
                font-size: medium;
                font-weight: 550;
            }
            .note-created {
                font-family: Open Sans;
                font-size: x-small;
                font-weight: 400;
            }
            .note-preview {
                font-family: Open Sans;
                font-size: small;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <section id="sidebar">
                <div id="sidebar-title">
                    <span>Notes</span>
                    <button id="add-notes-btn">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#000000"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-plus-icon lucide-plus"
                        >
                            <path d="M5 12h14" />
                            <path d="M12 5v14" />
                        </svg>
                    </button>
                </div>
                <div id="notes-list">
                    <div id="notes-empty" hidden>No notes yet. Click "+” to create one.</div>
                </div>
            </section>
            <section id="editor"></section>
        </div>
        <script>
            const notesList = document.getElementById("notes-list")
            const notesEmpty = document.getElementById("notes-empty")

            function renderNotes(notes) {
                notesList.innerHTML = ""
                if (!Array.isArray(notes) || notes.length === 0) {
                    notesEmpty.hidden = false
                    return
                }
                notesEmpty.hidden = true

                for (const note of notes) {
                    const item = document.createElement("button")
                    item.id = "note-item"
                    item.innerHTML = `
                        <div class="note-header">
                            <div class="note-title">${note.title ?? "(no title)"}</div>
                            <div class="note-created">${formatDateOnly(note.created_at) ?? ""}</div>
                        </div>
                        <div class="note-preview">${note.content_preview ?? ""}</div>
                        `
                    notesList.appendChild(item)
                }
            }

            async function loadNotes() {
                const res = await fetch("/api/notes/")
                if (!res.ok) throw new Error("Failed to load notes")

                const data = await res.json()

                // If your backend returns { notes: [...] } instead of [...]
                const notes = Array.isArray(data) ? data : (data.notes ?? [])

                renderNotes(notes)
            }

            document.addEventListener("DOMContentLoaded", () => {
                loadNotes().catch(() => {
                    notesEmpty.hidden = false
                    notesEmpty.textContent = "Could not load notes."
                })
            })

            function formatDateOnly(v) {
                if (!v) return ""
                const d = new Date(v)
                if (Number.isNaN(d.getTime())) return ""
                const dd = String(d.getDate()).padStart(2, "0")
                const mm = String(d.getMonth() + 1).padStart(2, "0")
                const yyyy = d.getFullYear()
                return `${dd}-${mm}-${yyyy}`
            }
        </script>
    </body>
</html>
