<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard</title>
        <style>
            body {
                margin: 0;
                display: flex;
            }
            nav {
                display: flex;
                flex-direction: column;
                width: 300px;
                height: 100vh;
                border-right: 1px solid hsl(0, 0%, 90%);
                padding: 10px 20px;
            }
            .profile {
                padding: 8px 10px;
            }
            .profile-name {
                font-family: "Arial";
                font-size: large;
                font-weight: bold;
            }
            .nav-bottom {
                padding: 8px 10px;
                margin-top: 100px;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            .board-tab,
            .settings-tab {
                font-family: "Arial";
                font-size: medium;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 10px;
            }
            .active {
                background-color: hsl(211, 100%, 95%);
                border-radius: 8px;
                color: hsl(211, 100%, 60%);
            }
            .active svg {
                stroke: hsl(211, 100%, 60%);
            }

            .username {
                font-family: "Arial";
                font-size: medium;
            }
        </style>
    </head>
    <body>
        <nav>
            <div class="profile">
                <span class="profile-name">Welcome back</span> <br /><span class="username">{{name i.id}}</span>
            </div>

            <div class="nav-bottom">
                <div class="board-tab active">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="#444444"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="lucide lucide-square-kanban-icon lucide-square-kanban"
                    >
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M8 7v7" />
                        <path d="M12 7v4" />
                        <path d="M16 7v9" />
                    </svg>
                    <span class="board">Board View</span>
                </div>
                <div class="settings-tab">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="#444444"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="lucide lucide-bolt-icon lucide-bolt"
                    >
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
                        />
                        <circle cx="12" cy="12" r="4" />
                    </svg>
                    <span class="settings">Settings</span>
                </div>
            </div>
        </nav>
    </body>
</html>
