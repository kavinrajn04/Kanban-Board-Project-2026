{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login</title>
        <style>
            :root {
                --color-primary: hsl(211, 100%, 50%);
                --color-primary-hover: hsl(211, 100%, 45%);
                --color-text: #1a1a1a;
                --color-text-muted: #555;
                --color-border: #d8dadf;
                --color-border-focus: hsl(211, 100%, 50%);
                --radius: 10px;
                --font-sans: "Arial";
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                font-family: var(--font-sans);
                background-color: white;
                color: var(--color-text);
            }

            .top-bar {
                display: flex;
                align-items: center;
                padding: 10px 20px;
                gap: 4px;
            }
        
            .logo {
                font-family: var(--font-sans);
                color: black;
                font-size: 28px;
                font-weight: 500;
                letter-spacing: -0.02em;
            }

            .main {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }

            .login-card {
                width: 100%;
                max-width: 320px;
                background: #fff;
                box-shadow: rgba(17, 12, 46, 0.15) 0px 48px 100px 0px;
                padding: 32px 28px;
                border-radius: var(--radius);
                display: flex;
                flex-direction: column;
            }
            .title-bar {
                margin-bottom: 18px;
            }
            .title {
                font-family: var(--font-sans);
                font-size: 22px;
                font-weight: 500;
            }

            .field-group {
                display: flex;
                flex-direction: column;
                margin-bottom: 18px;
            }

            label {
                font-size: 13px;
                font-weight: 500;
                color: var(--color-text-muted);
                margin-bottom: 6px;
            }

            input {
                font-family: var(--font-sans);
                font-size: 15px;
                padding: 10px 12px;
                border: 1px solid var(--color-border);
                border-radius: 8px;
                outline: none;
                transition:
                    border-color 0.15s ease,
                    box-shadow 0.15s ease;
            }

            input:focus {
                border-color: var(--color-border-focus);
                box-shadow: 0 0 0 3px hsla(211, 100%, 50%, 0.15);
            }

            button {
                margin-top: 10px;
                width: 100%;
                padding: 11px 0;
                font-family: var(--font-sans);
                font-size: 15px;
                font-weight: 500;
                cursor: pointer;
                background-color: var(--color-primary);
                color: white;
                border: none;
                border-radius: 8px;
                transition: background-color 0.15s ease;
            }

            button:hover {
                background-color: var(--color-primary-hover);
            }

            button:active {
                transform: translateY(1px);
            }

            button:disabled {
                background-color: #b9d4f5;
                cursor: not-allowed;
            }
        </style>
    </head>
    <body>
        <div class="top-bar">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#0061ff"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-layers-icon lucide-layers"
            >
                <path
                    d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z"
                />
                <path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12" />
                <path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17" />
            </svg>
            <span class="logo">Stak</span>
        </div>

        <div class="main">
            <div class="login-card">
                <form id="login-form" method="POST">
                    {% csrf_token %}
                    <div class="title-bar"><span class="title">Login</span></div>

                    <div class="field-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" autocomplete="username" required />
                    </div>

                    <div class="field-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" autocomplete="current-password" required />
                    </div>

                    <button type="submit">Login</button>
                </form>
            </div>
        </div>
    </body>
</html>
